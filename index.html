<style>
  :root{
    --green:#0B7C3E;        /* Golf Troop green */
    --green-d:#08602F;
    --ink:#14170F;          /* wordmark black */
    --ink-2:#4A5147;
    --paper:#E8E9E3;        /* card stock */
    --card:#FBFBF8;         /* printed cell */
    --rule:#CBD0C5;         /* pencil rule */
    --flag:#C8452F;

    --r:4px;
    --shadow:0 1px 0 rgba(20,23,15,.06), 0 8px 24px -18px rgba(20,23,15,.5);
    --display:"Barlow Condensed",system-ui,sans-serif;
    --body:"Inter",system-ui,sans-serif;
    --data:"DM Mono",ui-monospace,monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--body);background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;min-height:100vh;padding:24px;
  }
  @media (max-width:720px){ body{padding:12px} }

  button,input,select,textarea{font:inherit;color:inherit}
  button{cursor:pointer;background:none;border:none}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:2px}

  .shell{max-width:1320px;margin:0 auto}

  /* ---------- Masthead ---------- */
  .masthead{
    background:var(--card);border:1px solid var(--rule);border-bottom:none;
    border-radius:var(--r) var(--r) 0 0;padding:16px 20px;
    display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:12px}
  .brand .badge{width:38px;height:38px;border-radius:var(--r);display:block}
  .brand .wordmark{height:22px;display:block}
  .brand .sub{
    font-family:var(--data);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ink-2);padding-left:12px;margin-left:2px;border-left:1px solid var(--rule);
  }

  .month-nav{display:flex;align-items:center;gap:6px}
  .month-nav .m{
    font-family:var(--display);text-transform:uppercase;letter-spacing:.06em;
    font-size:24px;font-weight:600;min-width:190px;text-align:center;
  }
  .nav-btn{
    width:32px;height:32px;border:1px solid var(--rule);border-radius:var(--r);
    display:grid;place-items:center;font-size:15px;color:var(--ink-2);
    transition:background .15s,border-color .15s,color .15s;
  }
  .nav-btn:hover{background:var(--green);border-color:var(--green);color:#fff}

  /* score strip — the running total, like the OUT/IN row on a card */
  .strip{
    background:var(--ink);color:var(--card);display:flex;flex-wrap:wrap;
    border-left:1px solid var(--ink);border-right:1px solid var(--ink);
    border-bottom:3px solid var(--green);
  }
  .stat{
    padding:10px 20px 11px;border-right:1px solid rgba(251,251,248,.13);
    display:flex;align-items:baseline;gap:8px;
  }
  .stat b{font-family:var(--data);font-size:19px;font-weight:500}
  .stat.total b{color:#fff}
  .stat span{
    font-family:var(--display);font-size:12px;letter-spacing:.13em;
    text-transform:uppercase;color:rgba(251,251,248,.62);
  }
  .stat .dot{width:7px;height:7px;border-radius:50%;flex:none}

  /* ---------- Toolbar ---------- */
  .toolbar{
    background:var(--card);border:1px solid var(--rule);border-top:none;
    padding:12px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  }
  .toolbar .grow{flex:1;min-width:160px}
  .field{position:relative}
  .field label{
    position:absolute;top:-7px;left:8px;background:var(--card);padding:0 4px;
    font-family:var(--display);font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-2);
  }
  select,.txt{
    background:transparent;border:1px solid var(--rule);border-radius:var(--r);
    padding:8px 10px;font-size:13px;min-height:38px;
  }
  select{padding-right:26px;appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--ink-2) 50%),linear-gradient(135deg,var(--ink-2) 50%,transparent 50%);
    background-position:calc(100% - 14px) 17px,calc(100% - 9px) 17px;
    background-size:5px 5px,5px 5px;background-repeat:no-repeat;
  }
  .txt{min-width:180px;width:100%}
  .seg{display:flex;border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
  .seg button{
    padding:9px 14px;font-family:var(--display);font-size:13px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-2);
  }
  .seg button[aria-pressed="true"]{background:var(--ink);color:var(--card)}
  .btn{
    padding:9px 16px;border-radius:var(--r);font-family:var(--display);font-size:14px;
    letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--ink);
    transition:transform .1s,background .15s,color .15s;
  }
  .btn:active{transform:translateY(1px)}
  .btn.solid{background:var(--ink);color:var(--card)}
  .btn.solid:hover{background:var(--green);border-color:var(--green)}
  .btn.ghost:hover{background:rgba(20,23,15,.06)}
  .btn.green{background:var(--green);border-color:var(--green);color:#fff}
  .btn.green:hover{background:var(--green-d);border-color:var(--green-d)}

  /* ---------- Scorecard grid ---------- */
  .card-body{
    background:var(--card);border:1px solid var(--rule);border-top:none;
    border-radius:0 0 var(--r) var(--r);box-shadow:var(--shadow);overflow:hidden;
  }
  .grid{display:grid;grid-template-columns:repeat(7,1fr) 62px}
  .head{
    background:var(--ink-2);color:var(--card);padding:8px 10px;
    font-family:var(--display);font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  }
  .head.tot{background:var(--green);color:#fff;text-align:center}

  .day{
    min-height:132px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);
    padding:6px;display:flex;flex-direction:column;gap:4px;transition:background .12s;
  }
  .day.dim{background:#F1F2ED;color:#9AA396}
  .day.today{box-shadow:inset 0 0 0 2px var(--green)}
  .day.drop{background:rgba(11,124,62,.1)}
  .day .n{
    font-family:var(--data);font-size:12px;color:var(--ink-2);
    display:flex;justify-content:space-between;align-items:center;
  }
  .day.dim .n{color:#9AA396}
  .day .add{
    opacity:0;font-size:16px;line-height:1;color:var(--ink-2);
    width:20px;height:20px;border-radius:var(--r);transition:opacity .12s,background .12s,color .12s;
  }
  .day:hover .add,.day:focus-within .add{opacity:1}
  .day .add:hover{background:var(--green);color:#fff}

  .wtot{
    border-bottom:1px solid var(--rule);background:#F4F5F0;
    display:grid;place-items:center;font-family:var(--data);font-size:16px;
  }
  .wtot small{display:block;font-size:9px;color:#939C8E;text-align:center;letter-spacing:.08em}

  /* post chip — solid fill, colour IS the type */
  .chip{
    text-align:left;width:100%;border-radius:var(--r);padding:6px 8px;
    background:var(--green);color:#fff;border:none;
    display:block;transition:transform .1s,box-shadow .12s,filter .12s;cursor:grab;
  }
  .chip:hover{box-shadow:0 4px 12px -4px rgba(20,23,15,.45);transform:translateY(-1px);filter:brightness(1.12)}
  .chip.dragging{opacity:.4}
  .chip .t{font-size:12px;font-weight:500;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .chip .m{
    margin-top:3px;display:flex;gap:5px;align-items:center;
    font-family:var(--display);font-size:10px;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(255,255,255,.78);
  }
  .dot{width:8px;height:8px;border-radius:50%;flex:none}

  /* ---------- List view ---------- */
  .list{padding:0}
  .row{
    display:grid;grid-template-columns:100px 1fr 130px 150px;gap:14px;align-items:center;
    padding:12px 18px;border-bottom:1px solid var(--rule);text-align:left;width:100%;
  }
  .row:hover{background:#F4F5F0}
  .row .d{font-family:var(--data);font-size:12px;color:var(--ink-2)}
  .row .t{font-weight:500;font-size:14px}
  .row .t em{display:block;font-style:normal;font-size:12px;color:#7E887C;margin-top:2px;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .tag{
    display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;
    background:var(--green);color:#fff;border:none;
    font-family:var(--display);font-size:11px;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;
  }
  @media (max-width:900px){
    .row{grid-template-columns:1fr;gap:5px;padding:14px 16px}
    .row .d{order:-1}
    .row .tag{justify-self:start}
  }

  /* ---------- Phone ---------- */
  @media (max-width:760px){
    body{padding:0;background:var(--card)}
    .masthead{border-radius:0;border-left:none;border-right:none;padding:12px 14px;
      padding-top:calc(12px + env(safe-area-inset-top));
      position:sticky;top:0;z-index:20;justify-content:center;gap:10px}
    .brand{width:100%;justify-content:center}
    .brand .sub{display:none}
    .brand .badge{width:30px;height:30px}
    .brand .wordmark{height:18px}
    .month-nav{width:100%;justify-content:space-between}
    .month-nav .m{font-size:21px;min-width:0;flex:1}
    .strip{border-left:none;border-right:none;overflow-x:auto;flex-wrap:nowrap;
      -webkit-overflow-scrolling:touch;scrollbar-width:none}
    .strip::-webkit-scrollbar{display:none}
    .stat{padding:9px 14px;white-space:nowrap}
    .toolbar{border-left:none;border-right:none;padding:10px 12px;gap:8px}
    .toolbar .seg{flex:1}
    .toolbar .seg button{flex:1;padding:10px 0}
    .toolbar .field:not(.grow){flex:1}
    .toolbar .field:not(.grow) select{width:100%}
    .toolbar .grow{flex:1 1 100%}
    #addBtn{flex:1 1 100%;padding:12px}
    #exportBtn,#importBtn{flex:1}
    .card-body{border-radius:0;border-left:none;border-right:none;box-shadow:none}
    .foot{padding:14px;margin-top:0;font-size:11px;background:var(--paper)}

    /* compact dot grid — tap a day to open it */
    .grid{grid-template-columns:repeat(7,1fr)}
    .wtot,.head.tot{display:none}
    .head{padding:7px 2px;text-align:center;font-size:11px;letter-spacing:.06em}
    .day{min-height:58px;padding:4px 2px;gap:3px;align-items:center;cursor:pointer}
    .day .n{font-size:13px;justify-content:center;width:100%}
    .day .add{display:none}
    .day.today .n{color:var(--green);font-weight:500}
    .day .dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
    .day .dots .dot{width:9px;height:9px}
    .day .more{font-family:var(--data);font-size:9px;color:var(--ink-2)}
    .chip{display:none}
    .day:active{background:rgba(11,124,62,.08)}

    /* modal as bottom sheet */
    .scrim{padding:0;align-items:end}
    .modal{width:100%;max-height:94vh;border-radius:12px 12px 0 0}
    .modal .two{grid-template-columns:1fr}
    .modal footer{position:sticky;bottom:0;padding-bottom:calc(14px + env(safe-area-inset-bottom))}
    .f input,.f select,.f textarea{font-size:16px;padding:11px 12px}  /* 16px stops iOS zoom */
  }

  /* ---------- Day sheet (phone) ---------- */
  .daysheet{
    position:fixed;inset:0;background:rgba(20,23,15,.5);display:none;z-index:40;
    align-items:end;backdrop-filter:blur(2px);
  }
  .daysheet[open]{display:grid}
  .daysheet .panel{
    background:var(--card);width:100%;border-radius:12px 12px 0 0;
    max-height:80vh;display:flex;flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .daysheet .ph{
    display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
    border-bottom:1px solid var(--rule);
  }
  .daysheet .ph h3{
    font-family:var(--display);font-size:19px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;
  }
  .daysheet .ph button{font-size:20px;color:var(--ink-2);padding:4px 8px}
  .daysheet .pb{overflow-y:auto;padding:10px 12px;display:grid;gap:8px}
  .daysheet .pb .chip{display:block;padding:11px 12px;cursor:pointer}
  .daysheet .pb .chip .t{font-size:14px;-webkit-line-clamp:3}
  .daysheet .pb .chip .m{font-size:11px}
  .daysheet .pf{padding:10px 12px;border-top:1px solid var(--rule);background:#F4F5F0}
  .daysheet .pf .btn{width:100%;padding:12px}
  .daysheet .none{padding:24px 12px;text-align:center;color:#7E887C;font-size:13px}

  .empty{padding:60px 20px;text-align:center}
  .empty p{font-family:var(--display);font-size:17px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}
  .empty small{display:block;margin-top:6px;color:#7E887C;font-size:13px}

  /* ---------- Modal ---------- */
  .scrim{
    position:fixed;inset:0;background:rgba(20,23,15,.55);display:none;
    place-items:center;padding:20px;z-index:50;backdrop-filter:blur(2px);
  }
  .scrim[open]{display:grid}
  .modal{
    background:var(--card);border-radius:var(--r);width:min(560px,100%);
    max-height:90vh;overflow:auto;box-shadow:0 30px 60px -20px rgba(20,23,15,.6);
  }
  .modal header{
    background:var(--ink);color:var(--card);padding:14px 20px;
    border-bottom:3px solid var(--green);display:flex;justify-content:space-between;align-items:center;
  }
  .modal header h2{font-family:var(--display);font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
  .modal header button{color:var(--card);font-size:20px;line-height:1;padding:4px 8px}
  .form{padding:20px;display:grid;gap:16px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .f label{
    display:block;font-family:var(--display);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-2);margin-bottom:5px;
  }
  .f input,.f select,.f textarea{
    width:100%;border:1px solid var(--rule);border-radius:var(--r);padding:9px 10px;
    background:#fff;font-size:14px;
  }
  .f textarea{resize:vertical;min-height:110px;line-height:1.5}
  .f input:focus,.f select:focus,.f textarea:focus{border-color:var(--green);outline:none;box-shadow:0 0 0 3px rgba(11,124,62,.12)}
  .modal footer{
    padding:14px 20px;border-top:1px solid var(--rule);background:#F4F5F0;
    display:flex;gap:8px;justify-content:flex-end;align-items:center;
  }
  .modal footer .del{margin-right:auto;color:var(--flag);font-family:var(--display);
    font-size:13px;letter-spacing:.1em;text-transform:uppercase}
  .modal footer .del:hover{text-decoration:underline}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translate(-50%,80px);
    background:var(--ink);color:var(--card);padding:11px 18px;border-radius:var(--r);
    font-family:var(--display);font-size:14px;letter-spacing:.08em;text-transform:uppercase;
    border-left:3px solid var(--green);transition:transform .25s ease;z-index:60;
  }
  .toast.up{transform:translate(-50%,0)}

  .foot{
    display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;
    margin-top:14px;font-size:12px;color:var(--ink-2);
  }
  .foot code{font-family:var(--data);background:#DBDED4;padding:2px 6px;border-radius:3px}

  /* ---------- attachments ---------- */
  .attach{width:100%;border-color:var(--rule);color:var(--ink-2);min-height:38px;padding:8px}
  .attach:hover{border-color:var(--green);color:var(--green);background:rgba(11,124,62,.06)}
  .assets{display:grid;gap:10px}
  .assets:empty{display:none}
  .allbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:9px 12px;border:1px solid var(--rule);border-radius:var(--r);background:#F4F5F0;
  }
  .allbar span{
    font-family:var(--display);font-size:12px;letter-spacing:.13em;
    text-transform:uppercase;color:var(--ink-2);
  }
  .allbar button{
    background:var(--ink);color:#fff;padding:7px 14px;border-radius:var(--r);
    font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  }
  .allbar button:hover{background:var(--green)}
  .asset{border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;background:#F4F5F0}
  .asset .frame{
    position:relative;background:#14170F;display:grid;place-items:center;
    margin:0 auto;width:100%;
  }
  .asset .media{width:100%;height:100%;display:block;object-fit:cover;background:#E4E6DF}
  /* Instagram safe frames — what the post will actually crop to */
  .assets[data-ratio="4/5"]  .frame{aspect-ratio:4/5;  max-width:260px}
  .assets[data-ratio="9/16"] .frame{aspect-ratio:9/16; max-width:220px}
  .assets[data-ratio="free"] .frame{aspect-ratio:auto;  max-width:100%}
  .assets[data-ratio="free"] .media{max-height:260px;object-fit:contain}
  .asset .ratio{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:6px 10px;background:var(--ink);color:rgba(251,251,248,.65);
    font-family:var(--data);font-size:10px;letter-spacing:.06em;
  }
  .asset .ratio b{color:var(--ball,#fff);font-weight:500;color:#fff}
  .asset .ameta{display:flex;align-items:center;gap:10px;padding:8px 10px}
  .asset .nm{
    flex:1;min-width:0;font-family:var(--data);font-size:11px;color:var(--ink-2);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .asset .sz{font-family:var(--data);font-size:11px;color:#8E968A;flex:none}
  .asset .dl{
    flex:none;background:var(--green);color:#fff;padding:6px 12px;border-radius:var(--r);
    font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;text-decoration:none;
  }
  .asset .dl:hover{background:var(--green-d)}
  .asset .rm{flex:none;color:var(--flag);font-size:15px;padding:2px 6px;line-height:1}
  .asset .rm:hover{background:rgba(200,69,47,.1);border-radius:var(--r)}
  .asset .fallback{
    padding:22px 12px;text-align:center;font-size:12px;color:#7E887C;background:#EDEEE8;
  }

  /* file marker on a chip */
  .chip .clip{margin-left:auto;opacity:.85;font-size:10px;font-family:var(--data);letter-spacing:0}

  /* ---------- sync status ---------- */
  .sync{display:inline-flex;align-items:center;gap:7px}
  .sync i{width:8px;height:8px;border-radius:50%;background:#B6BDB0;flex:none;transition:background .2s}
  .sync.ok i{background:var(--green)}
  .sync.busy i{background:#E0A526;animation:pulse 1s infinite}
  .sync.err i{background:var(--flag)}
  @keyframes pulse{50%{opacity:.3}}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

<script>
/* ============================================================
   GOLF TROOP — CONTENT CARD
   Single file, no build step. Edit TYPES / SEED below, or Import a data.json.
   ============================================================ */

const TYPES = [
  {id:"reel",     label:"Reel",     color:"#0B7C3E"},                      /* Golf Troop green */
  {id:"carousel", label:"Carousel", color:"#14170F", onDark:"#FBFBF8"},    /* wordmark black */
  {id:"email",    label:"Email",    color:"#D64000"}                       /* flag orange */
];

/* --- Seed data. Replace with the real plan, or Import a data.json --- */
const SEED = [
  {id:"p1", date:iso(0,2),  type:"reel",     title:"Course reveal — opening drone push", course:"Cobble Beach", link:"", caption:"Cold open on the 17th tee. No talking head — let the reveal breathe."},
  {id:"p2", date:iso(0,4),  type:"carousel", title:"3 par-3s worth the drive", course:"", link:"", caption:"Swipe format. One course per slide, drive time in the corner."},
  {id:"p3", date:iso(0,15), type:"email",    title:"Weekender: cottage country loop", course:"", link:"", caption:"Two-package layout. Rotate banner colour off last week."},
  {id:"p4", date:iso(0,22), type:"reel",     title:"Caddie mic'd up — first tee nerves", course:"", link:"", caption:"Needs a release form from the caddie before this runs."}
];

/* ---------- state ---------- */
let posts = [];
let cursor = new Date(); cursor.setDate(1);
let view = "month";
let editingId = null;
let lastSynced = null;   // server's updatedAt, so we can spot other people's edits
let pushTimer = null;

const $ = s => document.querySelector(s);
const el = (t,c,txt) => { const n=document.createElement(t); if(c)n.className=c; if(txt!=null)n.textContent=txt; return n; };
const T = id => TYPES.find(t=>t.id===id) || TYPES[0];

function iso(monthOffset, day){
  const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+monthOffset); d.setDate(day);
  return localKey(d);
}
function localKey(d){
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,"0"), String(d.getDate()).padStart(2,"0")].join("-");
}
function safeLS(fn, fallback){ try{ return fn(); }catch(e){ return fallback; } }

/* ---------- server sync ---------- */
const CACHE_KEY = "gt-cache";

function setStatus(state, text){
  const s = $("#sync");
  s.className = "sync " + state;
  s.querySelector("span").textContent = text;
}

async function api(method, body){
  const res = await fetch("/api/posts", {
    method,
    headers: { "content-type":"application/json" },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok) throw new Error("request failed");
  return res.json();
}

/* Pull the shared calendar. Seeds it on very first run. */
async function pull(silent){
  try{
    if(!silent) setStatus("busy","Loading…");
    const data = await api("GET");
    if(data.posts === null){                 // nobody has saved anything yet
      posts = SEED.slice();
      await push();
      return;
    }
    if(data.updatedAt !== lastSynced){
      posts = data.posts;
      lastSynced = data.updatedAt;
      safeLS(()=>localStorage.setItem(CACHE_KEY, JSON.stringify(posts)));
      render();
    }
    setStatus("ok","All changes saved");
  }catch(err){
    const cached = safeLS(()=>localStorage.getItem(CACHE_KEY), null);
    if(cached && !posts.length){ try{ posts = JSON.parse(cached); render(); }catch(e){} }
    setStatus("err","Offline — showing last saved copy");
  }
}

/* Send the current calendar up. Debounced so typing doesn't hammer it. */
async function push(){
  pushTimer = null;
  try{
    setStatus("busy","Saving…");
    const data = await api("PUT", { posts });
    lastSynced = data.updatedAt;
    safeLS(()=>localStorage.setItem(CACHE_KEY, JSON.stringify(posts)));
    setStatus("ok","All changes saved");
    render();
  }catch(err){
    setStatus("err","Couldn't save — check your connection");
  }
}

/* Called after every edit: paint immediately, sync a beat later. */
function save(){
  render();
  setStatus("busy","Saving…");
  clearTimeout(pushTimer);
  pushTimer = setTimeout(push, 600);
}
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("up");
  clearTimeout(t._x); t._x = setTimeout(()=>t.classList.remove("up"), 2200);
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- filters ---------- */
function filtered(){
  const ty = $("#fType").value;
  const q = $("#fSearch").value.trim().toLowerCase();
  return posts.filter(x =>
    (!ty || x.type===ty) &&
    (!q || [x.title,x.course,x.caption].join(" ").toLowerCase().includes(q))
  );
}
function sameMonth(dstr){
  const d = new Date(dstr+"T12:00:00");
  return d.getMonth()===cursor.getMonth() && d.getFullYear()===cursor.getFullYear();
}
function fmtDay(dstr){
  return new Date(dstr+"T12:00:00").toLocaleString("en-US",{weekday:"short", month:"short", day:"numeric"});
}

/* ---------- render ---------- */
function render(){
  $("#mlabel").textContent = cursor.toLocaleString("en-US",{month:"long", year:"numeric"});
  const rows = filtered();
  renderStrip(rows);
  renderCourses();
  if(view==="month"){ $("#monthView").hidden=false; $("#listView").hidden=true; renderMonth(rows); }
  else { $("#monthView").hidden=true; $("#listView").hidden=false; renderList(rows); }
  $("#count").textContent = posts.length + " posts on the card";
}

function renderStrip(rows){
  const inMonth = rows.filter(p => sameMonth(p.date));
  const strip = $("#strip"); strip.innerHTML = "";
  const total = el("div","stat total");
  total.append(el("b",null,String(inMonth.length)), el("span",null,"posts this month"));
  strip.append(total);
  TYPES.forEach(t => {
    const n = inMonth.filter(p=>p.type===t.id).length;
    const onDark = t.onDark || t.color;   // black reads as nothing on the dark strip
    const d = el("div","stat");
    const dot = el("span","dot"); dot.style.background = onDark;
    const b = el("b",null,String(n)); b.style.color = onDark;
    d.append(dot, b, el("span",null,t.label+(n===1?"":"s")));
    strip.append(d);
  });
}

function renderMonth(rows){
  const wrap = $("#monthView"); wrap.innerHTML = "";
  const grid = el("div","grid");
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => grid.append(el("div","head",d)));
  grid.append(el("div","head tot","WK"));

  const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
  const offset = first.getDay();                   // Sunday-first
  const start = new Date(first); start.setDate(1-offset);
  const todayKey = localKey(new Date());

  for(let w=0; w<6; w++){
    let weekCount = 0;
    const cells = [];
    for(let i=0;i<7;i++){
      const d = new Date(start); d.setDate(start.getDate() + w*7 + i);
      const key = localKey(d);
      const dim = d.getMonth()!==cursor.getMonth();
      const dayPosts = rows.filter(p=>p.date===key);
      weekCount += dayPosts.length;

      const cell = el("div","day"+(dim?" dim":"")+(key===todayKey?" today":""));
      const n = el("div","n");
      n.append(el("span",null,String(d.getDate())));
      const add = el("button","add","+");
      add.setAttribute("aria-label","Add post on "+fmtDay(key));
      add.onclick = e => { e.stopPropagation(); openModal(null, key); };
      n.append(add);
      cell.append(n);

      if(isMobile()){
        const dots = el("div","dots");
        dayPosts.slice(0,3).forEach(p => {
          const dot = el("span","dot"); dot.style.background = T(p.type).color; dots.append(dot);
        });
        cell.append(dots);
        if(dayPosts.length>3) cell.append(el("div","more","+"+(dayPosts.length-3)));
        cell.setAttribute("role","button");
        cell.tabIndex = 0;
        cell.setAttribute("aria-label", fmtDay(key)+", "+dayPosts.length+" posts");
        cell.onclick = () => openDay(key);
        cell.onkeydown = e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openDay(key); } };
      } else {
        dayPosts.forEach(p => cell.append(chip(p)));
      }

      cell.addEventListener("dragover", e => { e.preventDefault(); cell.classList.add("drop"); });
      cell.addEventListener("dragleave", ()=> cell.classList.remove("drop"));
      cell.addEventListener("drop", e => {
        e.preventDefault(); cell.classList.remove("drop");
        const id = e.dataTransfer.getData("text/plain");
        const p = posts.find(x=>x.id===id);
        if(p && p.date!==key){ p.date = key; save(); toast("Moved to "+fmtDay(key)); }
      });
      cells.push(cell);
    }
    if(w===5 && cells.every(c=>c.classList.contains("dim"))) break;
    cells.forEach(c=>grid.append(c));
    const tot = el("div","wtot");
    tot.append(el("span",null,String(weekCount)), el("small",null,"wk "+(w+1)));
    grid.append(tot);
  }
  wrap.append(grid);
}

function chip(p){
  const t = T(p.type);
  const b = el("button","chip");
  b.style.background = t.color;
  b.draggable = true;
  b.append(el("div","t", p.title || "Untitled"));
  const m = el("div","m");
  m.append(el("span",null, t.label));
  if(p.course) m.append(el("span",null,"· "+p.course));
  const n = assetsOf(p).length;
  if(n) m.append(el("span","clip", n === 1 ? "◧ 1" : "◧ "+n));
  b.append(m);
  b.onclick = () => openModal(p.id);
  b.addEventListener("dragstart", e => { e.dataTransfer.setData("text/plain", p.id); b.classList.add("dragging"); });
  b.addEventListener("dragend", ()=> b.classList.remove("dragging"));
  return b;
}

function renderList(rows){
  const wrap = $("#listView"); wrap.innerHTML = "";
  const sorted = rows.slice().sort((a,b)=> a.date.localeCompare(b.date));
  if(!sorted.length){
    const e = el("div","empty");
    e.append(el("p",null,"Nothing on the card"));
    e.append(el("small",null,"Clear the filters, or add the first post."));
    wrap.append(e); return;
  }
  const list = el("div","list");
  sorted.forEach(p => {
    const t = T(p.type);
    const r = el("button","row");
    r.append(el("div","d", fmtDay(p.date)));
    const title = el("div","t", p.title || "Untitled");
    if(p.caption) title.append(el("em",null,p.caption));
    r.append(title);
    const tag = el("span","tag", t.label);
    tag.style.background = t.color;
    r.append(tag);
    r.append(el("div","d", p.course || "—"));
    r.onclick = () => openModal(p.id);
    list.append(r);
  });
  wrap.append(list);
}

function renderCourses(){
  const courses = [...new Set(posts.map(p=>p.course).filter(Boolean))].sort();
  $("#courses").innerHTML = courses.map(c=>`<option value="${esc(c)}">`).join("");
}

function fill(sel, items, withAll){
  const cur = sel.value;
  sel.innerHTML = withAll ? '<option value="">All</option>' : "";
  items.forEach(i => { const o=el("option",null,i.label); o.value=i.id; sel.append(o); });
  if([...sel.options].some(o=>o.value===cur)) sel.value = cur;
}

/* ---------- phone: day sheet ---------- */
const MOBILE = window.matchMedia("(max-width:760px)");
function isMobile(){ return MOBILE.matches; }
let openDate = null;

function openDay(key){
  openDate = key;
  $("#dsTitle").textContent = fmtDay(key);
  renderDay();
  $("#daysheet").setAttribute("open","");
}
function renderDay(){
  const body = $("#dsBody"); body.innerHTML = "";
  const dayPosts = filtered().filter(p => p.date===openDate);
  if(!dayPosts.length){
    body.append(el("div","none","No posts on this day yet."));
    return;
  }
  dayPosts.forEach(p => {
    const c = chip(p);
    c.draggable = false;
    c.onclick = () => { closeDay(); openModal(p.id); };
    body.append(c);
  });
}
function closeDay(){ $("#daysheet").removeAttribute("open"); openDate = null; }
$("#dsClose").onclick = closeDay;
$("#daysheet").onclick = e => { if(e.target===$("#daysheet")) closeDay(); };
$("#dsAdd").onclick = () => { const d = openDate; closeDay(); openModal(null, d); };

/* redraw when crossing the phone/desktop line */
let wasMobile = isMobile();
window.addEventListener("resize", () => {
  if(isMobile() !== wasMobile){ wasMobile = isMobile(); closeDay(); render(); }
});

/* ---------- modal ---------- */
function openModal(id, presetDate){
  editingId = id;
  const p = id ? posts.find(x=>x.id===id) : null;
  $("#mTitle").textContent = p ? "Edit post" : "New post";
  $("#iTitle").value   = p?.title   ?? "";
  $("#iDate").value    = p?.date    ?? presetDate ?? localKey(new Date());
  $("#iType").value    = p?.type    ?? "reel";
  $("#iCourse").value  = p?.course  ?? "";
  $("#iCaption").value = p?.caption ?? "";
  draftAssets = p ? assetsOf(p).slice() : [];
  renderAssets();
  $("#delBtn").hidden = !p;
  $("#scrim").setAttribute("open","");
  setTimeout(()=>$("#iTitle").focus(), 30);
}
function closeModal(){ $("#scrim").removeAttribute("open"); editingId = null; }

$("#saveBtn").onclick = () => {
  const title = $("#iTitle").value.trim();
  if(!title){ $("#iTitle").focus(); toast("Give the post a title"); return; }
  const data = {
    title,
    date: $("#iDate").value || localKey(new Date()),
    type: $("#iType").value,
    course: $("#iCourse").value.trim(),
    assets: draftAssets.slice(),
    caption: $("#iCaption").value.trim()
  };
  if(editingId){ Object.assign(posts.find(p=>p.id===editingId), data); toast("Post updated"); }
  else { posts.push({id:"p"+Date.now().toString(36), ...data}); toast("Post added"); }
  closeModal(); save();
};
$("#delBtn").onclick = () => {
  if(!confirm("Delete this post from the card?")) return;
  posts = posts.filter(p=>p.id!==editingId);
  closeModal(); save(); toast("Post deleted");
};
$("#closeBtn").onclick = $("#cancelBtn").onclick = closeModal;
$("#scrim").onclick = e => { if(e.target===$("#scrim")) closeModal(); };
document.addEventListener("keydown", e => {
  if(e.key==="Escape"){
    if($("#scrim").hasAttribute("open")) closeModal();
    else if($("#daysheet").hasAttribute("open")) closeDay();
  }
  const typing = /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName);
  if(e.key==="n" && !typing && !$("#scrim").hasAttribute("open")){ e.preventDefault(); openModal(); }
});

/* ---------- toolbar ---------- */
$("#addBtn").onclick = () => openModal();
$("#prev").onclick = () => { cursor.setMonth(cursor.getMonth()-1); render(); };
$("#next").onclick = () => { cursor.setMonth(cursor.getMonth()+1); render(); };
$("#today").onclick = () => { cursor = new Date(); cursor.setDate(1); render(); };
$("#vMonth").onclick = () => setView("month");
$("#vList").onclick  = () => setView("list");
function setView(v){
  view = v;
  $("#vMonth").setAttribute("aria-pressed", v==="month");
  $("#vList").setAttribute("aria-pressed", v==="list");
  render();
}
["fType","fSearch"].forEach(id => $("#"+id).addEventListener("input", render));

$("#exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(posts, null, 2)], {type:"application/json"});
  const a = el("a"); a.href = URL.createObjectURL(blob);
  a.download = "data.json"; a.click(); URL.revokeObjectURL(a.href);
  toast("Exported data.json");
};
$("#importBtn").onclick = () => $("#fileIn").click();
$("#fileIn").onchange = e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const parsed = JSON.parse(r.result);
      if(!Array.isArray(parsed)) throw 0;
      posts = parsed; save(); toast("Imported " + parsed.length + " posts");
    }catch(err){ toast("That file isn't a valid content card"); }
  };
  r.readAsText(f);
  e.target.value = "";
};

/* ---------- boot ---------- */
fill($("#fType"), TYPES, true);
fill($("#iType"), TYPES, false);

/* ---------- assets (Dropbox) ----------
   Chooser hands back a preview link ending in ?dl=0.
   raw=1  -> the file itself, so it can render inline.
   dl=1   -> forces a download of the untouched original.            */
let draftAssets = [];

const rawUrl = u => u.replace(/([?&])dl=0/, "$1raw=1");
const dlUrl  = u => u.replace(/([?&])dl=0/, "$1dl=1");
const isImg  = n => /\.(jpe?g|png|gif|webp|heic|avif)$/i.test(n || "");
const isVid  = n => /\.(mp4|mov|m4v|webm)$/i.test(n || "");
const fileSize = b => !b ? "" : b > 1048576 ? (b/1048576).toFixed(1)+" MB" : Math.round(b/1024)+" KB";

/* Older posts stored a single `link`. Fold those into the new shape. */
function assetsOf(p){
  if(Array.isArray(p.assets)) return p.assets;
  if(p.link) return [{ name:"Attachment", link:p.link, bytes:0 }];
  return [];
}

/* What Instagram will crop this to, based on the post type. */
const SPECS = {
  reel:     { ratio:"9/16", label:"1080 × 1920" },
  carousel: { ratio:"4/5",  label:"1080 × 1350" },
  email:    { ratio:"free", label:"Any size" }
};

function renderAssets(){
  const wrap = $("#assets"); wrap.innerHTML = "";
  const spec = SPECS[$("#iType").value] || SPECS.reel;
  wrap.dataset.ratio = spec.ratio;

  if(draftAssets.length > 1){
    const bar = el("div","allbar");
    bar.append(el("span",null, draftAssets.length + " files attached"));
    const all = el("button",null,"Download all");
    all.type = "button";
    all.onclick = () => downloadAll();
    bar.append(all);
    wrap.append(bar);
  }

  draftAssets.forEach((a, i) => {
    const box = el("div","asset");

    if(isImg(a.name) || isVid(a.name)){
      const frame = el("div","frame");
      if(isImg(a.name)){
        const img = el("img","media"); img.src = rawUrl(a.link); img.alt = a.name;
        img.onerror = () => { frame.replaceWith(el("div","fallback","Preview unavailable — use Download")); };
        frame.append(img);
      } else {
        const v = document.createElement("video");
        v.className = "media"; v.controls = true; v.preload = "metadata"; v.playsInline = true;
        v.src = rawUrl(a.link);
        v.onerror = () => { frame.replaceWith(el("div","fallback","Preview unavailable — use Download")); };
        frame.append(v);
      }
      box.append(frame);

      const r = el("div","ratio");
      r.append(el("span",null, spec.ratio === "free" ? "No crop applied" : "Cropped to "+spec.ratio.replace("/",":")));
      r.append(el("b",null, spec.label));
      box.append(r);
    }

    const meta = el("div","ameta");
    meta.append(el("span","nm", a.name));
    if(a.bytes) meta.append(el("span","sz", fileSize(a.bytes)));

    const dl = el("a","dl","Download");
    dl.href = dlUrl(a.link); dl.setAttribute("download","");
    meta.append(dl);

    const rm = el("button","rm","✕");
    rm.type = "button";
    rm.title = "Remove from this post";
    rm.onclick = () => { draftAssets.splice(i,1); renderAssets(); };
    meta.append(rm);

    box.append(meta);
    wrap.append(box);
  });
}

/* Browsers cancel rapid-fire downloads, so stagger them. */
function downloadAll(){
  draftAssets.forEach((a, i) => {
    setTimeout(() => {
      const link = el("a");
      link.href = dlUrl(a.link);
      link.setAttribute("download", a.name);
      document.body.append(link);
      link.click();
      link.remove();
    }, i * 700);
  });
  toast("Downloading " + draftAssets.length + " files");
}

$("#iType").addEventListener("change", renderAssets);

$("#iAttach").onclick = () => {
  if(typeof Dropbox === "undefined" || !Dropbox.choose){
    toast("Dropbox isn't set up yet"); return;
  }
  Dropbox.choose({
    linkType: "preview",          // a durable share link, not a 4-hour temp one
    multiselect: true,            // a carousel is 8 images, not 1
    extensions: ["images","video"],
    success: files => {
      files.forEach(f => draftAssets.push({ name:f.name, link:f.link, bytes:f.bytes }));
      renderAssets();
    }
  });
};

/* ---------- polling: pick up the other person's edits ---------- */
function startPolling(){
  setInterval(() => {
    if(document.hidden) return;
    if($("#scrim").hasAttribute("open")) return;   // don't yank the form out from under someone
    if(pushTimer) return;                          // we have unsent changes
    pull(true);
  }, 15000);
  document.addEventListener("visibilitychange", () => {
    if(!document.hidden && !pushTimer) pull(true);
  });
}

/* ---------- boot ---------- */
(async () => {
  render();
  await pull();
  startPolling();
})();
</script>
</body>
